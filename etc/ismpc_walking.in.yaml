---
# Finite state machine
#
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
- "@MC_CONTROLLER_INSTALL_PREFIX@/ismpc_walking/states"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"



ObserverPipelines:     
  name: "ObserverPipeline"
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
      required: true
      update: true
    - type: KinematicInertial
      update: true
      config:
        cutoff: 0.02
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.02
    - type: BodySensor
      update: false
      config:
        bodySensor: FloatingBase

constraints:
  - type: contact
  - type: collision
  # KinematicsConstraint, i.e. joint limits see equation (3.6) in Joris Vaillant's thesis
  #  interaction distance (d_i) safety distance (d_s) damper offset (xi_off)
  #  applies to main robot
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
collisions:
  - type: collision
    useMinimal: true
robots:
  ground:
    module: env/ground
  
ismpc:
  Tc: 1.5
  Tp: 10
  delta: 0.05
  beta_u: 1
  beta_step: 1e3
  beta_stab: 1e5
  beta_traj : 1e1
  # hrp4cr
  # u_cstr_square: [10,10]
  # zmp_cstr_square: [0.15,0.07]
  # zmp_ref_offset: [0.0,0.02]
  # offset: [0.0,0.0]
  # zmp_cstr_square_static: [0.15,0.06]
  # offset_static: [0.0,0]
  # next_stp_cstr_ratio: 1
  # lambda: 15
  # lambda_dbl_supp: 15
  # zmp_delay: 0.025
  # feet_distance: 0.15
  # zmp_ref_start_step: [0.,0.]
  # zmp_ref_end_step: [0.,0.]
  # hrp4
  # u_cstr_square: [10,10]
  # zmp_cstr_square: [0.2,0.09]
  # zmp_ref_offset: [0.0,0.04]
  # offset: [0.0,0.0]
  # zmp_cstr_square_static: [0.2,0.09]
  # offset_static: [0.0,0]
  # next_stp_cstr_ratio: 1
  # lambda: 35
  # lambda_dbl_supp: 35
  # zmp_delay: 0.01
  # feet_distance: 0.17
  #hrp2
  # lambda: 25
  # zmp_delay: 0.02
  # u_cstr_square: [0.2,0.13]
  # zmp_cstr_square: [0.2,0.12]
  # zmp_ref_offset: [0.0,0.03]
  # offset: [0.0,0.0]
  # zmp_cstr_square_static: [0.2,0.1]
  # offset_static: [0.0,0]
  # next_stp_cstr_ratio: 1
  # feet_distance: 0.2
  #hrp5_p
  # lambda: 25
  # zmp_delay: 0.02
  # u_cstr_square: [0.2,0.13]
  # zmp_cstr_square: [0.2,0.12]
  # zmp_ref_offset: [0.0,0.03]
  # offset: [0.0,0.0]
  # zmp_cstr_square_static: [0.2,0.1]
  # offset_static: [0.0,0]
  # next_stp_cstr_ratio: 1
  # feet_distance: 0.2
  # rhps1
  u_cstr_square: [10,10]
  zmp_cstr_square: [0.2,0.12]
  zmp_ref_offset: [0.0,0.03]
  offset: [0.0,0.0]
  zmp_cstr_square_static: [0.2,0.09]
  offset_static: [0.0,0]
  next_stp_cstr_ratio: 1
  lambda: 20
  lambda_dbl_supp: 20
  zmp_delay: 0.01
  feet_distance: 0.17

  allow_none_tail: true
  foosteps_kin_cstr: [0.6,0.25]
  footsteps_cstr_square: [0.6,0.25]
  ts_range: [0.7,2]
  tds_range: [0.2,1.5]
  tss_range: [0.5,1.5]
  double_support_ratio: 0.4
  ts: 1.3
  sliding_zmp_cstr_region: false
  use_stability_task: false
  safety_thresholds:
    beta_range: [1e-9,1e9]
    zmp_cstr_square_min: 0.01
    zmp_cstr_square_max: 1

footsteps_planner:
  Tp: 10
  delta: 0.1
  Ts_limit: [0.4,5]
  kinematics_cstr: [0.6,0.08]
  #hrp2drc
  # feet_distance: 0.2
  #hrp4cr
  # feet_distance: 0.15
  #hrp4
  # feet_distance: 0.17
  #rhps1
  feet_distance: 0.2
  #hrp5_p
  # feet_distance: 0.2
  mean_speed: 0.1
  robot_height: 150
  max_rotation: 0.17

tasks:
  swingfoot_stiffness: 50
  swingfoot_weight: 1000
  swingfoot_dimweight: [1.,1.,1.,1.,1.,1.]
  swingfoot_dimstiffness: [1.,1.,1.,1.,1.,1.]


walking_controller:
  auto_start:
    activate: false
    steps: 10
    speed: [0,0.0,0]
    t_steps: 1.1
  min_sg_suport_duration: 0.75
  min_dbl_suport_duration: 0.25
  foot_landing_offset: -3e-3
  max_step_duration: 2
  impact_threshold: 40
  footstep_height: 0.05
  wrench_filter_cutoff_T: 2
  gamma_filter_cutoff_T: 0.2
  safety_foot_roll_error: 0.1
  robot:
    hrp4:
      torsoBodyName: "torso"
      leftFootLink: "L_FOOT_LINK"
      rightFootLink: "R_FOOT_LINK"
      left_hand_surface: "LeftHand"
      right_hand_surface: "RightHand"
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"
    hrp4cr:
      torsoBodyName: "CHEST_P_LINK"
      leftFootLink: "L_TOE_P_LINK"
      rightFootLink: "R_TOE_P_LINK"
      left_hand_surface: "LeftHand"
      right_hand_surface: "RightHand"
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"
      momemtum_task_joints: ["L_SHOULDER_P","L_SHOULDER_R","R_SHOULDER_P","R_SHOULDER_R",
                                "CHEST_P","CHEST_R"]
    hrp2_drc:
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"
      left_hand_surface: "LeftFingers"
      right_hand_surface: "RightFingers"
      torsoBodyName: "CHEST_LINK0"
      leftFootLink: "LLEG_LINK5"
      rightFootLink: "RLEG_LINK5"
      # momemtum_task_joints: ["LARM_JOINT0",
      #                           "RARM_JOINT0","RARM_JOINT3","LARM_JOINT3"]
      momemtum_task_joints: ["Root","CHEST_JOINT0",
                                "CHEST_JOINT1"]
    hrp5_p:
      torsoBodyName: "Chest_Link0"
      leftFootLink: "Lleg_Link5"
      rightFootLink: "Rleg_Link5"
      left_hand_surface: "LeftHand"
      right_hand_surface: "RightHand"
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"
      # momemtum_task_joints: ["L_SHOULDER_P","L_SHOULDER_R","L_ELBOW_P","R_SHOULDER_P","R_SHOULDER_R","R_ELBOW_P",
      #                           "CHEST_P","CHEST_R"]

    rhps1:
      torsoBodyName: "CHEST_P_LINK"
      leftFootLink: "L_ANKLE_P"
      rightFootLink: "R_ANKLE_P"
      left_hand_surface: "LeftHandWrench"
      right_hand_surface: "RightHandWrench"
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"

stabilizer:
  robot:
    hrp4cr:
      stabilizer:
        dcm_tracking:
          integrator_time_constant: 2
          gains:
            prop: [0,0]
            integral: [0,0]
            deriv: [0., 0.]
            comdError: 0.
        admittance:
          df: [0.0001,0.0001,0.0001]
          cop: [0.02, 0.02]
          copFzLambda: [15,4,20]
          copFzLambdaSupportFoot: [15,8]
          copFzDelay: 0.01
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
          # copActiveJoints:
          #   right: ["Root","R_ANKLE_P","R_ANKLE_R","R_KNEE_P","R_HIP_P","R_HIP_R"]
          #   left: ["Root","L_ANKLE_P","L_ANKLE_R","L_KNEE_P","L_HIP_P","L_HIP_R"]
        tasks:
          contact:
            constrainCoP: false
            damping: 300.
          torso:
            stiffness: 2
            weight: 100
          pelvis:
            stiffness: 2
            weight: 500
          com:
            stiffness: [100.,100.,100.]
            dimWeight: [1 , 1 , 1]
            weight: 10000.
            height: 0.8
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          comBiasLimit: [0.1,0.1]
          biasLimit: [0.05, 0.02]
          withDCMBias: true
          correctCoMPos: true
        external_wrench:
          ## general ##
          add_expected_com_offset: false
          subtract_measured_value: false
          exclude_from_dcm_bias_est : true
          ## com offset ##
          modify_com_error: false
          modify_zmp_error: false
          modify_zmp_error_d: false
          com_offset_err_com_limit: 0.05
          com_offset_err_zmp_limit: 0.05
          ## filter ##
          ext_wrench_sum_cutoff: 0.05
          com_offset_cutoff: 0.05
          com_offset_com_cutoff: 10.0
          derivator_time_constant: 1.0
          ## gain (not loaded automatically) ##
          ext_wrench_gain: [1, 1, 1]
      stabilizer_sgsupp:
        tasks:
          com:
            weight: 1000
        admittance:
          copFzLambda: [10,10,10]
          cop: [0.02, 0.02]
      stabilizer_dblsupp:
        admittance:
          dfSupportFoot: [0.0001,0.0001,0.0001]
          copFzLambdaSupportFoot: [15,8]
          cop: [0.01, 0.01]
      safety_tresholds:
        MIN_DS_PRESSURE: 0
    hrp4:
      stabilizer:
        dcm_tracking:
          gains:
            prop: [0,0]
            integral: [0,0]
            deriv: [0., 0.]
            comdError: 0.
        admittance:
          copFzLambda: [35,35,35]
          copFzDelay: 0.015
          df: [0.0001,0.0001,0.00015]
          cop: [0.02, 0.02]
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          contact:
            constrainCoP: false
            damping: 300.
          com:
            stiffness: [100.,100.,100.]
            dimWeight: [1 , 1 , 1]
            weight: 5000.
            height: 0.76
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          comBiasLimit: [0.1,0.1]
          biasLimit: [0.05, 0.02]
          withDCMBias: true
          correctCoMPos: true
        external_wrench:
          ## general ##
          add_expected_com_offset: false
          subtract_measured_value: false
          exclude_from_dcm_bias_est : true
          ## com offset ##
          modify_com_error: true
          modify_zmp_error: false
          modify_zmp_error_d: false
          com_offset_err_com_limit: 0.05
          com_offset_err_zmp_limit: 0.05
          ## filter ##
          ext_wrench_sum_cutoff: 0.05
          com_offset_cutoff: 0.05
          com_offset_com_cutoff: 10.0
          derivator_time_constant: 1.0
          ## gain (not loaded automatically) ##
          ext_wrench_gain: [1, 1, 1]
      stabilizer_sgsupp:
        tasks:
          com:
            weight: 500
        admittance:
          cop: [0.02, 0.02]
      stabilizer_dblsupp:
        admittance:
          cop: [0.02, 0.02]
      safety_tresholds:
        MIN_DS_PRESSURE: 0
    hrp2_drc:
      stabilizer:
        dcm_tracking:
          integrator_time_constant: 2
          gains:
            prop: [0,0]
            integral: [0,0]
            deriv: [0., 0.]
            comdError: 0.
        admittance:
          df: [0.002,0.001,0.0001]
          cop: [0.01, 0.01]
          copFzLambda: [20,20,20]
          copFzDelay: 0.015
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          contact:
            constrainCoP: false
            damping: 300.
          torso:
            stiffness: 2
            weight: 100
          pelvis:
            stiffness: 2
            weight: 500
          com:
            stiffness: [100.,100.,100.]
            # active_joints: ["Root", "RLEG_JOINT0", "RLEG_JOINT1", "RLEG_JOINT2", "RLEG_JOINT3", "RLEG_JOINT4", "RLEG_JOINT5",
            #                 "LLEG_JOINT0", "LLEG_JOINT1", "LLEG_JOINT2", "LLEG_JOINT3", "LLEG_JOINT4", "LLEG_JOINT5",
            #                 "LARM_JOINT0", "LARM_JOINT1", "LARM_JOINT2", "LARM_JOINT3", "LARM_JOINT4", "LARM_JOINT5",
            #                 "RARM_JOINT0", "RARM_JOINT1", "RARM_JOINT2", "RARM_JOINT3", "RARM_JOINT4", "RARM_JOINT5"]
            dimWeight: [1 , 1 , 1]
            weight: 1000.
            height: 0.85
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          comBiasLimit: [0.1,0.1]
          biasLimit: [0.05, 0.02]
          withDCMBias: true
          correctCoMPos: true
        external_wrench:
          ## general ##
          add_expected_com_offset: false
          subtract_measured_value: false
          exclude_from_dcm_bias_est : true
          ## com offset ##
          modify_com_error: true
          modify_zmp_error: false
          modify_zmp_error_d: false
          com_offset_err_com_limit: 0.05
          com_offset_err_zmp_limit: 0.05
          ## filter ##
          ext_wrench_sum_cutoff: 0.05
          com_offset_cutoff: 0.05
          com_offset_com_cutoff: 10.0
          derivator_time_constant: 1.0
          ## gain (not loaded automatically) ##
          ext_wrench_gain: [1, 1, 1]
      stabilizer_sgsupp:
        admittance:
          dfz: 0.0002
          cop: [0.015, 0.015]
        tasks:
          torso:
            weight: 500
          pelvis:
            weight: 500
        admittance:
          dfz: 0.0001
          cop: [0.03, 0.03]
    hrp5_p:
      stabilizer:
        dcm_tracking:
          integrator_time_constant: 2
          gains:
            prop: [0,0]
            integral: [0,0]
            deriv: [0., 0.]
            comdError: 0.
        admittance:
          df: [0.0001,0.0001,0.0001]
          rollAdmittance: 0.0000
          cop: [0.01, 0.01]
          copFzLambda: [20,20,20]
          copFzDelay: 0.025
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          contact:
            damping: 300.
          torso:
            stiffness: 2
            weight: 100
          pelvis:
            stiffness: 2
            weight: 500
          com:
            stiffness: [100.,100.,100.]
            dimWeight: [1 , 1 , 1]
            weight: 10000.
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          comBiasLimit: [0.1,0.1]
          biasLimit: [0.05, 0.02]
          withDCMBias: true
          correctCoMPos: true
        external_wrench:
          ## general ##
          add_expected_com_offset: false
          subtract_measured_value: false
          exclude_from_dcm_bias_est : true
          ## com offset ##
          modify_com_error: true
          modify_zmp_error: false
          modify_zmp_error_d: false
          com_offset_err_com_limit: 0.05
          com_offset_err_zmp_limit: 0.05
          ## filter ##
          ext_wrench_sum_cutoff: 0.05
          com_offset_cutoff: 0.05
          com_offset_com_cutoff: 10.0
          derivator_time_constant: 1.0
          ## gain (not loaded automatically) ##
          ext_wrench_gain: [1, 1, 1]
      stabilizer_sgsupp:
        admittance:
          cop: [0.02, 0.02]
      safety_tresholds:
        MIN_DS_PRESSURE: 0
    rhps1:
      stabilizer:
        dcm_tracking:
          gains:
            prop: [0,0]
            integral: [0,0]
            deriv: [0., 0.]
            comdError: 0.
        admittance:
          copFzLambda: [20,20,20]
          copFzDelay: 0.015
          df: [0.0001,0.0001,0.00015]
          cop: [0.01, 0.01]
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          contact:
            constrainCoP: false
            damping: 300.
          com:
            stiffness: [100.,100.,100.]
            dimWeight: [1 , 1 , 1]
            weight: 5000.
            height: 0.84
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          comBiasLimit: [0.1,0.1]
          biasLimit: [0.05, 0.02]
          withDCMBias: true
          correctCoMPos: true
        external_wrench:
          ## general ##
          add_expected_com_offset: false
          subtract_measured_value: false
          exclude_from_dcm_bias_est : true
          ## com offset ##
          modify_com_error: true
          modify_zmp_error: false
          modify_zmp_error_d: false
          com_offset_err_com_limit: 0.05
          com_offset_err_zmp_limit: 0.05
          ## filter ##
          ext_wrench_sum_cutoff: 0.05
          com_offset_cutoff: 0.05
          com_offset_com_cutoff: 10.0
          derivator_time_constant: 1.0
          ## gain (not loaded automatically) ##
          ext_wrench_gain: [1, 1, 1]
      stabilizer_sgsupp:
        tasks:
          com:
            weight: 500
        admittance:
          cop: [0.02, 0.02]
      stabilizer_dblsupp:
        admittance:
          cop: [0.01, 0.01]
      safety_tresholds:
        MIN_DS_PRESSURE: 0

transitions:
  - [Initial,Ok,Initial]


Plugins: [footsteps_planner_plugin,mc_joystick_plugin]

  
  

