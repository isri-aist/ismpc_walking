---
# Finite state machine
#
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
- "@MC_CONTROLLER_INSTALL_PREFIX@/ismpc_walking/states"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"



ObserverPipelines:     
  name: "ObserverPipeline"
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
      required: false
    - type: KinematicInertial
      config:
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.02
   

constraints:
  - type: contact
  - type: collision
  # KinematicsConstraint, i.e. joint limits see equation (3.6) in Joris Vaillant's thesis
  #  interaction distance (d_i) safety distance (d_s) damper offset (xi_off)
  #  applies to main robot
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
collisions:
  - type: collision
    useMinimal: true
robots:
  ground:
    module: env/ground
  
controller:
  start_at_launch: false
  steps: 10
  speed: [0,0.0,0]
  t_steps: 2
  robot:
    hrp4:
      torsoBodyName: "torso"
      leftFootLink: "l_ankle"
      rightFootLink: "r_ankle"
    hrp4cr:
      torsoBodyName: "CHEST_P_LINK"
      leftFootLink: "L_TOE_P_LINK"
      rightFootLink: "R_TOE_P_LINK"
ismpc:
  Tc: 1.5
  Tp: 4
  delta: 5e-2
  beta: 1e5
  beta_stab: 1e8
  beta_traj : 1e1
  zmp_cstr_square: [0.1,0.05]
  zmp_cstr_square_sg_supp: [0.07,0.06]
  next_stp_cstr_ratio: 1
  offset: [0.0,0.0]
  offset_sg_supp: [0.00,0.0]
  allow_none_tail: true
  foosteps_kin_cstr: [0.4,0.05]
  footsteps_cstr_square: [0.15,0.05]
  double_support_ratio: 0.25
  sliding_zmp_cstr_region: false
  use_stability_task: false
  safety_thresholds:
    beta_range: [1e-9,1e9]
    zmp_cstr_square_min: 0.01
    zmp_cstr_square_max: 0.2

footsteps_planner:
  Tp: 6
  delta: 0.05
  Ts_limit: [1,2]
  kinematics_cstr: [0.4,0.08]
  feet_distance: 0.15
  mean_speed: 0.1
  robot_height: 150
  max_rotation: 0.17

tasks:
  swingfoot_stiffness: 50
  swingfoot_weight: 5000
  swingfoot_dimweight: [1.,1.,1.,1.,1.,1.]
  swingfoot_dimstiffness: [1.,1.,1.,1.,1.,1.]

walking_controller:
  right_foot_surface: "RightFootCenter"
  left_foot_surface: "LeftFootCenter"
  auto_start:
    activate: false
    steps: 10
    speed: [0.2,0.0,0]
    t_steps: 1.5
  external_wrench_gains:
    couple: [1., 1., 1.]
    force: [1., 1., 1.]
  min_sg_suport_duration: 0.75
  min_dbl_suport_duration: 0.25
  max_step_duration: 2
  impact_threshold: 30
  robot:
    hrp4:
      torsoBodyName: "torso"
      leftFootLink: "l_ankle"
      rightFootLink: "r_ankle"
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"
    hrp4cr:
      torsoBodyName: "CHEST_P_LINK"
      leftFootLink: "L_TOE_P_LINK"
      rightFootLink: "R_TOE_P_LINK"
      right_foot_surface: "RightFootCenter"
      left_foot_surface: "LeftFootCenter"

stabilizer:
  robot:
    hrp4cr:
      stabilizer:
        dcm_tracking:
          gains:
            prop: [4,4]
            integral: [5,5]
            deriv: [0.,0.]
            comdError: 0.
        admittance:
          dfz: 0.0002
          cop: [0.03, 0.04]
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          contact:
            damping: 300.
          torso:
            stiffness: 2
            weight: 500
          com:
            stiffness: [1000.,1000.,100.]
            weight: 1000.
            height: 0.817
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          biasLimit: [0.05, 0.02]
          withDCMBias: true

    hrp4:
      stabilizer:
        dcm_tracking:
          gains:
            prop: 5
            integral: 10
            deriv: 0.
            comdError : 0.
        admittance:
          cop: [0.01, 0.01]
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          torso:
            pitch: 0.12
            stiffness: 2
            weight: 500
          com:
            stiffness: [1000.,1000.,100.]
            weight: 1000.
            dimWeight: [1 , 1 , 1]
            height: 0.78
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          biasLimit: [0.05, 0.02]
          withDCMBias: true


transitions:
  - [Initial,Ok,Initial]


Plugins: [footsteps_planner_plugin]

  
  

