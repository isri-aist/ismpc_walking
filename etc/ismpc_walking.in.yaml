---
# Finite state machine
#
IdleKeepState: true
StatesFiles:
- "@MC_STATES_DEFAULT_INSTALL_PREFIX@/data"
StatesLibraries:
- "@MC_STATES_DEFAULT_INSTALL_PREFIX@"
- "@MC_CONTROLLER_INSTALL_PREFIX@/ismpc_walking/states"


ObserverPipelines:     
  name: "LIPMWalkingObserverPipeline"
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
      required: false
    - type: KinematicInertial
      config:
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.02
   

constraints:
  - type: contact
  - type: collision
  # KinematicsConstraint, i.e. joint limits see equation (3.6) in Joris Vaillant's thesis
  #  interaction distance (d_i) safety distance (d_s) damper offset (xi_off)
  #  applies to main robot
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
collisions:
  - type: collision
    useMinimal: true
robots:
  ground:
    module: env/ground
  
controller:
  start_at_launch: false
  steps: 10
  speed: [0,0.0,0]
  t_steps: 2
  robot:
    hrp4:
      torsoBodyName: "torso"
      leftFootLink: "l_ankle"
      rightFootLink: "r_ankle"
    hrp4cr:
      torsoBodyName: "CHEST_P_LINK"
      leftFootLink: "L_TOE_P_LINK"
      rightFootLink: "R_TOE_P_LINK"
 
ismpc:
  Tc: 2
  Tp: 6
  delta: 5e-2
  beta: 1e6
  beta_stab: 1e8
  beta_traj : 0.
  zmp_cstr_square: [0.1,0.05]
  zmp_cstr_square_sg_supp: [0.1,0.05]
  next_stp_cstr_ratio: 1
  offset: [0.0,0.0]
  offset_sg_supp: [0.00,0.0]
  allow_none_tail: true
  footsteps_cstr_square: [0.3,0.05]
  double_support_ratio: 0.25
  sliding_zmp_cstr_region: false
  use_stability_task: false
  safety_thresholds:
    beta_range: [1e2,1e6]
    zmp_cstr_square_min: 0.01
    zmp_cstr_square_max: 0.2

footsteps_planner:
  Tp: 6
  delta: 0.05
  Ts_limit: [0.7,2]
  kinematics_cstr: [0.3,0.05]
  feet_distance: 0.16
  mean_speed: 0.1
  robot_height: 150
  max_rotation: 0.17

tasks:
  swingfoot_stiffness: 300
  swingfoot_weight: 5000
  swingfoot_dimweight: [1.,1.,1.,1.,1.,1.]
  swingfoot_dimstiffness: [1.,1.,1.,1.,1.,1.]
  supportfoot_stiffness: 20000
  supportfoot_weight: 10000

stabilizer:
  robot:
    hrp4cr:
      stabilizer:
        dcm_tracking:
          gains:
            prop: 4
            integral: 5
            deriv: 0.2
        admittance:
          cop: [0.03, 0.04]
          maxVel:
            angular: [3., 3., 3.]
            linear: [1., 1., 1.]
        tasks:
          contact:
            damping: 300.
          torso:
            stiffness: 2
            weight: 500
          com:
            stiffness: [1000.,1000.,100.]
            weight: 10000.
            height: 0.817
        dcm_bias:
          dcmMeasureErrorStd: 0.001
          biasDriftPerSecondStd: 0.0001
          zmpMeasureErrorStd: 0.0005
          biasLimit: [0.05, 0.02]
          withDCMBias: true

    hrp4:
      stabilizer:
        # dcm_tracking:
        #   gains:
        #     prop: 2
        #     integral: 0
        #     deriv: 0.
        # admittance:
        #   maxVel:
        #     angular: [3., 3., 3.]
        #     linear: [1., 1., 1.]
        tasks:
          torso:
            pitch: 0.12
            stiffness: 2
            weight: 500
        #   com:
        #     stiffness: [1000.,1000.,100.]
        #     weight: 10000.
        #     height: 0.78
        # dcm_bias:
        #   dcmMeasureErrorStd: 0.001
        #   biasDriftPerSecondStd: 0.0001
        #   zmpMeasureErrorStd: 0.0005
        #   biasLimit: [0.05, 0.02]
        #   withDCMBias: true

states:
  Test_Posture:
    base: MetaTasks
    tasks:
      taskPosture:
        type: posture
        stiffness: 1
        #damping: 4
        weight: 5.0

init: Test_Posture
  
transitions:
  - [Initial,Ok,Initial]

Plugins: [footsteps_planner_plugin,mocap_plugin]

  
  

