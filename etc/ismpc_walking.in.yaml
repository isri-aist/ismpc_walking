---
# Finite state machine
#
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
- "@MC_CONTROLLER_INSTALL_PREFIX@/ismpc_walking/states"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"

ObserverPipelines:
  name: "ObserverPipeline"
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
      required: true
      update: true
      config:
        KalmanFilter:
          gyr_cov: 1e-6 # default is 1e-10
    - type: KinematicInertial
      update: true
      config:
        cutoff: 0.02
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.02
    - type: BodySensor
      update: false
      config:
        bodySensor: FloatingBase

Posture:
  NECK_P: 0.5 

constraints:
  - type: contact
  - type: collision
  # KinematicsConstraint, i.e. joint limits see equation (3.6) in Joris Vaillant's thesis
  #  interaction distance (d_i) safety distance (d_s) damper offset (xi_off)
  #  applies to main robot
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
  # - type: dynamics
collisions:
  - type: collision
    useCommon: true
robots:
  ground:
    module: env/ground

ismpc:
  Tc: 1.5
  Tp: 10
  delta: 0.05
  beta_zmp_vel: 0.001
  beta_dcm: 0
  beta_dcm_static: 0
  beta_step: 1e3
  beta_stab: 1e5
  beta_traj : 1e1
  allow_none_tail: true
  foosteps_kin_cstr: [0.6,0.15]
  footsteps_cstr_square: [0.6,0.15]
  ts_range: [0.7,2]
  tds_range: [0.2,1.5]
  tss_range: [0.5,1.5]
  double_support_ratio: 0.25
  ts: 1.1
  sliding_zmp_cstr_region: false
  use_stability_task: false
  safety_thresholds:
    beta_range: [1e-9,1e9]
    zmp_cstr_square_min: 0.01
    zmp_cstr_square_max: 1

footsteps_planner:
  Tp: 10
  delta: 0.1
  Ts_limit: [0.4,5]
  kinematics_cstr: [0.4,0.08]
  mean_speed: 0.1
  robot_height: 150
  max_rotation: 0.1

tasks:
  swingfoot_stiffness: 50
  swingfoot_weight: 1000
  momentum_task_weight: 100000

walking_controller:
  auto_start:
    activate: false
    steps: 100
    speed: [0.25,0.0,0.1]
    ts: 1.1
    double_support_ratio: 0.25

  min_sg_suport_duration: 0.75
  min_dbl_suport_duration: 0.25
  foot_landing_offset: -3e-3
  max_step_duration: 2
  impact_threshold: 40
  footstep_height: 0.08
  wrench_filter_cutoff_T: 2
  gamma_filter_cutoff_T: 0.2
  safety_foot_roll_error: 0.1
  max_swing_foot_velocity: 1.6
  stability_error_threshold: 0.2

transitions:
  - [Initial,Ok,Initial]

Plugins: [footsteps_planner_plugin,mc_joystick_plugin]
